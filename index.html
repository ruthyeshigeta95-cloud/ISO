<!DOCTYPE html>
<html>
<head>
  <title>ISO AI Smart Tutor v14 (Snapchat Level 4 Realism)</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f14">

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; color:white; overflow:hidden; }

    #ui {
      position:absolute; top:10px; width:100%; text-align:center; z-index:20;
    }

    button, select {
      background:#1f6feb; color:white; border:none; padding:10px;
      margin:5px; border-radius:10px; cursor:pointer;
    }

    #panel {
      position:absolute; right:10px; top:80px; width:220px;
      background:#161b22; padding:10px; border-radius:12px; z-index:20;
    }

    #chat {
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      width:90%; max-height:160px; overflow-y:auto;
      background:#161b22; padding:10px; border-radius:12px;
      z-index:20;
    }

    canvas { display:block; }

    #callMode, #incomingCall {
      position:absolute; top:0; left:0; width:100vw; height:100vh;
      display:none; z-index:100;
    }

    #callMode { background:black; }

    #incomingCall {
      background:rgba(0,0,0,0.95);
      align-items:center;
      justify-content:center;
      flex-direction:column;
    }

    .center {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center;
    }
  </style>
</head>

<body>

<div id="ui">
  <h2>🤖 ISO Smart Tutor v14 (Snapchat Level 4)</h2>
  <button onclick="startVoice()">🎤 Talk</button>
  <button onclick="enterCallMode()">📞 Call ISO</button>
  <button onclick="fakeIncomingCall()">📲 Incoming Call</button>
</div>

<div id="panel">
  <h3>Avatar</h3>
  <label>Skin</label><input type="color" id="skin" onchange="updateAvatar()"><br><br>
  <label>Eyes</label><input type="color" id="eyes" onchange="updateAvatar()"><br><br>
  <label>Hair</label>
  <select id="hair" onchange="updateAvatar()">
    <option value="short">Short</option>
    <option value="spiky">Spiky</option>
    <option value="curly">Curly</option>
  </select>
</div>

<div id="chat"></div>

<div id="callMode"></div>

<div id="incomingCall">
  <div class="center">
    <h1>📞 ISO is calling you...</h1>
    <button onclick="acceptCall()">✅ Accept</button>
    <button onclick="rejectCall()">❌ Reject</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let head, leftEye, rightEye;
let mouth;
let inCall = false;
let isSpeaking = false;
let emotion = "neutral";

// ---------------- AI ----------------
async function ai(text){
  return text;
}

// ---------------- VOICE ----------------
function startVoice(){
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = new SR();
  rec.lang = "en-US";

  rec.onresult = async e => {
    let text = e.results[0][0].transcript;
    addMsg("You: " + text);

    let reply = await ai(text);
    addMsg("ISO: " + reply);

    speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
  };

  rec.start();
}

// ---------------- CHAT ----------------
function addMsg(t){
  let d = document.createElement("div");
  d.innerText = t;
  document.getElementById("chat").appendChild(d);
}

// ---------------- CALL ----------------
function fakeIncomingCall(){
  document.getElementById("incomingCall").style.display="block";
}
function acceptCall(){
  document.getElementById("incomingCall").style.display="none";
  enterCallMode();
}
function rejectCall(){
  document.getElementById("incomingCall").style.display="none";
}
function enterCallMode(){
  inCall=true;
}

// ---------------- 3D ----------------
function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  let headGeo = new THREE.SphereGeometry(0.9,32,32);
  let headMat = new THREE.MeshBasicMaterial({color:0xffcc99});
  head = new THREE.Mesh(headGeo, headMat);
  scene.add(head);

  let eyeGeo = new THREE.SphereGeometry(0.12,16,16);
  let eyeMat = new THREE.MeshBasicMaterial({color:0x00aaff});

  leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  rightEye = new THREE.Mesh(eyeGeo, eyeMat);

  leftEye.position.set(-0.25,0.2,0.8);
  rightEye.position.set(0.25,0.2,0.8);

  scene.add(leftEye);
  scene.add(rightEye);

  let mouthGeo = new THREE.BoxGeometry(0.4,0.1,0.1);
  let mouthMat = new THREE.MeshBasicMaterial({color:0x000000});
  mouth = new THREE.Mesh(mouthGeo, mouthMat);
  mouth.position.set(0,-0.3,0.8);
  scene.add(mouth);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  head.rotation.y += 0.01;

  if(isSpeaking){
    mouth.scale.y = 1 + Math.sin(Date.now()*0.02)*0.5;
  } else {
    mouth.scale.y = 1;
  }

  renderer.render(scene, camera);
}

init();

</script>

</body>
</html>
